name: a11y

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  axe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Start server
        env:
          SPEEDTEST_AUTH_SECRET: ci-only-secret-do-not-use-in-prod
          DATABASE_URL: file:./speedtest.db
        run: |
          bun scripts/migrate.ts || true
          bun server.ts &
          echo $! > server.pid
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3003/api/health >/dev/null; then
              echo "Server is up"
              break
            fi
            sleep 1
          done

      - name: Run axe scan
        run: bunx @axe-core/cli http://localhost:3003/login --exit --tags wcag2a,wcag2aa,wcag21a,wcag21aa

      - name: Run Lighthouse CI
        run: bunx @lhci/cli autorun --config=.lighthouserc.json || true

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi
