services:
  speedtest:
    build: .
    container_name: speedtest-monitor
    ports:
      - "3000:3000"
    environment:
      SPEEDTEST_INTERVAL_MINUTES: "15"
      TZ: "Europe/Paris"
      AUTH_SECRET: ${AUTH_SECRET:-}
    volumes:
      - speedtest-data:/data
    restart: unless-stopped

volumes:
  speedtest-data:
